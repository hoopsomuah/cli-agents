<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CLI Agents — Presentation</title>
    <meta
      name="description"
      content="From Teletype to Rhythm of Business — full-screen presentation deck."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="deck.css" />
    <script>
      // Anti-FOUC: set palette + mode before stylesheet paints.
      // Deck defaults to dark; reading view defaults to light.
      (function () {
        try {
          var pKey = 'cli-agents-palette';
          var mKey = 'cli-agents-mode';
          var legacy = 'cli-agents-theme';
          var validPalettes = ['editorial','ink','solar','forest','slate','rose','ocean','sunset'];
          var palette = localStorage.getItem(pKey);
          var mode = localStorage.getItem(mKey);
          if (!mode) {
            var old = localStorage.getItem(legacy);
            if (old === 'light' || old === 'dark') {
              mode = old;
              localStorage.setItem(mKey, mode);
            }
          }
          if (validPalettes.indexOf(palette) === -1) palette = 'editorial';
          if (mode !== 'light' && mode !== 'dark') mode = 'dark';
          document.documentElement.setAttribute('data-palette', palette);
          document.documentElement.setAttribute('data-mode', mode);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <main id="deck" class="deck" aria-live="polite">
      <div class="deck__stage" id="stage"></div>
      <div class="deck__loading" id="loading">
        <div class="deck__loading-dot"></div>
        <p>Loading deck…</p>
      </div>
    </main>

    <div class="deck__chrome">
      <div class="deck__counter">
        <span id="counter-current">01</span>
        <span class="deck__counter-sep">/</span>
        <span id="counter-total">--</span>
      </div>
      <div class="deck__controls">
        <button id="btn-prev" class="deck__btn" aria-label="Previous">←</button>
        <button id="btn-next" class="deck__btn" aria-label="Next">→</button>
        <button id="btn-fullscreen" class="deck__btn" aria-label="Fullscreen">⛶</button>
        <div class="palette-picker-wrap">
          <button
            id="palette-toggle"
            class="deck__btn deck__btn--palette"
            type="button"
            aria-label="Choose color theme"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="palette-picker"
            title="Choose color theme"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <circle cx="7.5" cy="10" r="1.2" fill="currentColor" stroke="none" />
              <circle cx="12" cy="7" r="1.2" fill="currentColor" stroke="none" />
              <circle cx="16.5" cy="10" r="1.2" fill="currentColor" stroke="none" />
              <circle cx="15.5" cy="15" r="1.2" fill="currentColor" stroke="none" />
              <path d="M12 21 a3 3 0 0 1 0 -6" />
            </svg>
          </button>
          <div
            id="palette-picker"
            class="deck-palette-picker"
            role="dialog"
            aria-label="Color theme"
            hidden
          >
            <p class="deck-palette-picker__label">Color theme</p>
            <ul class="deck-palette-picker__grid" data-picker-grid></ul>
            <p class="deck-palette-picker__current" data-picker-current>Editorial · Dark</p>
          </div>
        </div>
        <button id="theme-toggle" class="deck__btn deck__btn--theme" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
        <a href="../" class="deck__btn deck__btn--exit" aria-label="Exit to reading mode">Read mode</a>
      </div>
    </div>

    <div class="deck__progress" id="progress"></div>

    <div class="deck__hint" id="hint">
      <kbd>→</kbd> next · <kbd>←</kbd> back · <kbd>F</kbd> fullscreen · <kbd>Esc</kbd> exit
    </div>

    <script type="module" src="deck.js"></script>
    <script type="module" src="theme.js"></script>
  </body>
</html>
