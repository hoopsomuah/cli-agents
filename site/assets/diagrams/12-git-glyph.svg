<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="gitGlyphTitle gitGlyphDesc">
  <title id="gitGlyphTitle">Git: commits on a line, with a branch</title>
  <desc id="gitGlyphDesc">An abstract diagram of version control: a horizontal main line of commit dots labelled with one-line messages, and a second branch line splitting off and merging back.</desc>
  <style>
    .line { stroke: currentColor; stroke-width: 4; fill: none; opacity: 0.55; }
    .node { fill: currentColor; }
    .ring { fill: none; stroke: currentColor; stroke-width: 4; }
    .lbl  { fill: currentColor; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 15px; opacity: 0.85; }
    .cap  { fill: currentColor; font-family: "Inter", system-ui, sans-serif; font-size: 16px; font-weight: 600; opacity: 0.7; }
  </style>

  <!-- main line -->
  <path class="line" d="M70 200 H570" />
  <!-- branch out and back -->
  <path class="line" d="M210 200 C 250 110, 330 110, 370 110 H430 C 470 110, 500 150, 530 200" />

  <!-- main commits -->
  <circle class="node" cx="70"  cy="200" r="11" />
  <circle class="node" cx="210" cy="200" r="11" />
  <circle class="node" cx="370" cy="200" r="11" />
  <circle class="node" cx="530" cy="200" r="13" />

  <!-- branch commits -->
  <circle class="ring" cx="370" cy="110" r="11" />
  <circle class="ring" cx="430" cy="110" r="11" />

  <!-- commit messages -->
  <text class="lbl" x="58"  y="240">init</text>
  <text class="lbl" x="180" y="240">draft</text>
  <text class="lbl" x="335" y="240">edit</text>
  <text class="lbl" x="500" y="240">merge</text>
  <text class="lbl" x="338" y="92">try</text>
  <text class="lbl" x="398" y="92">fix</text>

  <text class="cap" x="70"  y="300">main</text>
  <text class="cap" x="360" y="70">a branch: a safe place to try a change</text>
</svg>
