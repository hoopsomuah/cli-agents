<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="File over app stack">
  <style>
    .title { font-family: "Source Serif 4", Georgia, serif; font-size: 18px; font-weight: 500; fill: #1a1a1a; }
    .label { font-family: "Source Serif 4", Georgia, serif; font-size: 16px; fill: #1a1a1a; }
    .small { font-family: "Source Serif 4", Georgia, serif; font-style: italic; font-size: 13px; fill: #5a5546; }
    .files-box { fill: #fdfaf3; stroke: #1a1a1a; stroke-width: 2; }
    .app-box { fill: #f4ede0; stroke: #5a5546; stroke-width: 1.2; stroke-dasharray: 5 4; }
    .arrow { stroke: #1e3a5f; stroke-width: 1.5; fill: none; }
  </style>

  <text x="450" y="40" text-anchor="middle" class="title">Files are the foundation. Apps come and go.</text>

  <!-- Layer 4: ephemeral apps -->
  <text x="80" y="100" class="small">come and go →</text>
  <rect x="180" y="80" width="120" height="50" class="app-box" rx="4" />
  <text x="240" y="110" text-anchor="middle" class="label" font-size="14">Obsidian</text>
  <rect x="320" y="80" width="120" height="50" class="app-box" rx="4" />
  <text x="380" y="110" text-anchor="middle" class="label" font-size="14">VS Code</text>
  <rect x="460" y="80" width="120" height="50" class="app-box" rx="4" />
  <text x="520" y="110" text-anchor="middle" class="label" font-size="14">a CLI agent</text>
  <rect x="600" y="80" width="160" height="50" class="app-box" rx="4" />
  <text x="680" y="110" text-anchor="middle" class="label" font-size="14">the next thing</text>

  <!-- Arrows pointing down to the bedrock -->
  <line x1="240" y1="135" x2="240" y2="180" class="arrow" />
  <polygon points="240,185 235,177 245,177" fill="#1e3a5f" />
  <line x1="380" y1="135" x2="380" y2="180" class="arrow" />
  <polygon points="380,185 375,177 385,177" fill="#1e3a5f" />
  <line x1="520" y1="135" x2="520" y2="180" class="arrow" />
  <polygon points="520,185 515,177 525,177" fill="#1e3a5f" />
  <line x1="680" y1="135" x2="680" y2="180" class="arrow" />
  <polygon points="680,185 675,177 685,177" fill="#1e3a5f" />

  <!-- Bedrock: files -->
  <rect x="120" y="200" width="660" height="220" class="files-box" rx="4" />
  <text x="450" y="240" text-anchor="middle" class="label" font-weight="500" font-size="20">Your files</text>
  <text x="450" y="265" text-anchor="middle" class="small">plain text · open format · yours forever</text>

  <!-- File icons inside -->
  <g transform="translate(180,290)">
    <rect width="80" height="100" fill="#fffef9" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="10" y1="22" x2="70" y2="22" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="34" x2="70" y2="34" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="46" x2="55" y2="46" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="58" x2="70" y2="58" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="70" x2="40" y2="70" stroke="#5a5546" stroke-width="0.8" />
    <text x="40" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a">team.md</text>
  </g>
  <g transform="translate(300,290)">
    <rect width="80" height="100" fill="#fffef9" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="10" y1="22" x2="70" y2="22" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="34" x2="70" y2="34" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="46" x2="60" y2="46" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="58" x2="70" y2="58" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="70" x2="50" y2="70" stroke="#5a5546" stroke-width="0.8" />
    <text x="40" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a">agenda.md</text>
  </g>
  <g transform="translate(420,290)">
    <rect width="80" height="100" fill="#fffef9" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="10" y1="22" x2="70" y2="22" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="34" x2="60" y2="34" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="46" x2="70" y2="46" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="58" x2="55" y2="58" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="70" x2="70" y2="70" stroke="#5a5546" stroke-width="0.8" />
    <text x="40" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a">budget.csv</text>
  </g>
  <g transform="translate(540,290)">
    <rect width="80" height="100" fill="#fffef9" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="10" y1="22" x2="70" y2="22" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="34" x2="70" y2="34" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="46" x2="50" y2="46" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="58" x2="65" y2="58" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="70" x2="70" y2="70" stroke="#5a5546" stroke-width="0.8" />
    <text x="40" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a">notes.md</text>
  </g>
  <g transform="translate(660,290)">
    <rect width="80" height="100" fill="#fffef9" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="10" y1="22" x2="70" y2="22" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="34" x2="60" y2="34" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="46" x2="70" y2="46" stroke="#5a5546" stroke-width="0.8" />
    <line x1="10" y1="58" x2="55" y2="58" stroke="#5a5546" stroke-width="0.8" />
    <text x="40" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a1a1a">README</text>
  </g>

  <!-- Caption -->
  <text x="450" y="455" text-anchor="middle" class="small">"The most important factor is owning your data, not the app." — Steph Ango</text>
</svg>
