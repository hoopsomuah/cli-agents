<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Lineage from telegraph to modern terminal">
  <style>
    .axis { stroke: #c8bfae; stroke-width: 1.5; }
    .tick { stroke: #c8bfae; stroke-width: 1; }
    .year { font-family: "Source Serif 4", Georgia, serif; font-size: 14px; fill: #5a5546; }
    .label { font-family: "Source Serif 4", Georgia, serif; font-size: 16px; fill: #1a1a1a; }
    .label-italic { font-family: "Source Serif 4", Georgia, serif; font-style: italic; font-size: 14px; fill: #5a5546; }
    .accent { fill: #1e3a5f; }
    .box { fill: #fdfaf3; stroke: #1a1a1a; stroke-width: 1.5; }
    .connector { stroke: #1e3a5f; stroke-width: 1; fill: none; stroke-dasharray: 3 3; }
  </style>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" class="label" font-size="18" font-weight="500">From stock ticker to Windows Terminal — a 150-year line</text>

  <!-- Main timeline -->
  <line x1="80" y1="220" x2="1120" y2="220" class="axis" />

  <!-- Ticks and milestones -->
  <!-- 1869 -->
  <line x1="120" y1="215" x2="120" y2="225" class="tick" />
  <text x="120" y="248" text-anchor="middle" class="year">1869</text>
  <rect x="60" y="135" width="120" height="60" class="box" rx="2" />
  <text x="120" y="158" text-anchor="middle" class="label" font-size="14">Stock ticker</text>
  <text x="120" y="178" text-anchor="middle" class="label-italic">Edison &amp; Callahan</text>
  <line x1="120" y1="195" x2="120" y2="215" class="connector" />

  <!-- 1908 -->
  <line x1="280" y1="215" x2="280" y2="225" class="tick" />
  <text x="280" y="248" text-anchor="middle" class="year">1908</text>
  <rect x="220" y="265" width="120" height="60" class="box" rx="2" />
  <text x="280" y="288" text-anchor="middle" class="label" font-size="14">Morkrum printer</text>
  <text x="280" y="308" text-anchor="middle" class="label-italic">first "Teletype"</text>
  <line x1="280" y1="225" x2="280" y2="265" class="connector" />

  <!-- 1930 -->
  <line x1="440" y1="215" x2="440" y2="225" class="tick" />
  <text x="440" y="248" text-anchor="middle" class="year">1930</text>
  <rect x="380" y="135" width="120" height="60" class="box" rx="2" />
  <text x="440" y="158" text-anchor="middle" class="label" font-size="14">Model 15</text>
  <text x="440" y="178" text-anchor="middle" class="label-italic">5-bit Baudot</text>
  <line x1="440" y1="195" x2="440" y2="215" class="connector" />

  <!-- 1963 -->
  <line x1="600" y1="215" x2="600" y2="225" class="tick" />
  <text x="600" y="248" text-anchor="middle" class="year">1963</text>
  <rect x="540" y="265" width="120" height="60" class="box" rx="2" />
  <text x="600" y="288" text-anchor="middle" class="label" font-size="14">ASCII standard</text>
  <text x="600" y="308" text-anchor="middle" class="label-italic">Model 33</text>
  <line x1="600" y1="225" x2="600" y2="265" class="connector" />

  <!-- 1978 -->
  <line x1="760" y1="215" x2="760" y2="225" class="tick" />
  <text x="760" y="248" text-anchor="middle" class="year">1978</text>
  <rect x="700" y="135" width="120" height="60" class="box" rx="2" />
  <text x="760" y="158" text-anchor="middle" class="label" font-size="14">VT100</text>
  <text x="760" y="178" text-anchor="middle" class="label-italic">DEC, glass terminal</text>
  <line x1="760" y1="195" x2="760" y2="215" class="connector" />

  <!-- 1990s -->
  <line x1="920" y1="215" x2="920" y2="225" class="tick" />
  <text x="920" y="248" text-anchor="middle" class="year">1990s</text>
  <rect x="860" y="265" width="120" height="60" class="box" rx="2" />
  <text x="920" y="288" text-anchor="middle" class="label" font-size="14">xterm / cmd.exe</text>
  <text x="920" y="308" text-anchor="middle" class="label-italic">software TTYs</text>
  <line x1="920" y1="225" x2="920" y2="265" class="connector" />

  <!-- 2019 -->
  <line x1="1080" y1="215" x2="1080" y2="225" class="tick" />
  <text x="1080" y="248" text-anchor="middle" class="year">2019</text>
  <rect x="1010" y="135" width="140" height="60" class="box" rx="2" />
  <text x="1080" y="158" text-anchor="middle" class="label" font-size="14" font-weight="500">Windows Terminal</text>
  <text x="1080" y="178" text-anchor="middle" class="label-italic">tabs, GPU, Unicode</text>
  <line x1="1080" y1="195" x2="1080" y2="215" class="connector" />

  <!-- Arrowhead at end -->
  <polygon points="1120,220 1110,215 1110,225" fill="#c8bfae" />
</svg>
